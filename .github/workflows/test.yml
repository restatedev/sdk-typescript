name: Build and test

on:
  pull_request:
    branches: [main, release-**]
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    # prevent from running on forks
    if: github.repository_owner == 'restatedev'
    runs-on: warp-ubuntu-latest-x64-4x
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm verify
      - run: pnpm pack --filter "./packages/libs/**" --pack-destination .
      - run: find -type f -name "restatedev-restate-sdk-[0-9.]*\.tgz" | xargs -I {} mv {} restatedev-restate-sdk.tgz
      - run: find -type f -name "restatedev-restate-sdk-clients-[0-9.]*\.tgz" | xargs -I {} mv {} restatedev-restate-sdk-clients.tgz
      - run: find -type f -name "restatedev-restate-sdk-core-[0-9.]*\.tgz" | xargs -I {} mv {} restatedev-restate-sdk-core.tgz
      - run: find -type f -name "restatedev-restate-sdk-gen-[0-9.]*\.tgz" | xargs -I {} mv {} restatedev-restate-sdk-gen.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: restatedev-restate-sdk
          path: restatedev-restate-sdk.tgz
          retention-days: 1
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: restatedev-restate-sdk-clients
          path: restatedev-restate-sdk-clients.tgz
          retention-days: 1
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: restatedev-restate-sdk-core
          path: restatedev-restate-sdk-core.tgz
          retention-days: 1
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: restatedev-restate-sdk-gen
          path: restatedev-restate-sdk-gen.tgz
          retention-days: 1
          if-no-files-found: error

  # restate-sdk-gen ships a testcontainers-based e2e suite that boots a
  # real Restate container via @restatedev/restate-sdk-testcontainers and
  # runs workflows against it. Cheap enough to gate on PR; runs in
  # parallel with the build job above.
  restate-sdk-gen-e2e:
    if: github.repository_owner == 'restatedev'
    runs-on: warp-ubuntu-latest-x64-4x
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run e2e tests
        run: pnpm --filter @restatedev/restate-sdk-gen test:e2e
        timeout-minutes: 15
