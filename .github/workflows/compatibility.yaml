name: Compatibility

# Controls when the workflow will run
on:
  pull_request:
  pull_request_target:
  push:
    branches:
      - main

jobs:
  node:
    uses: ./.github/workflows/_test-node-template.yml

  deno:
    uses: ./.github/workflows/_test-deno-template.yml

  bun:
    uses: ./.github/workflows/_test-bun-template.yml

  cloudflare:
    uses: ./.github/workflows/_test-cloudflare-template.yml

  vercel:
    uses: ./.github/workflows/_test-vercel-template.yml

  lambda:
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) }}
    uses: ./.github/workflows/_test-lambda-template.yml
    secrets: inherit
