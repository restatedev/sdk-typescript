[package]
name = "sdk-shared-core-wasm-bindings"
version = "0.1.0"
authors = ["slinkydeveloper <francescoguard@gmail.com>"]
edition = "2018"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
wasm-bindgen = "0.2.121"
restate-sdk-shared-core = { git = "https://github.com/restatedev/sdk-shared-core.git", rev = "bf73b9900744d47e1daed0134e049d2526499d5c", features = ["request_identity", "rust_crypto", "tracing_pretty"] }
console_error_panic_hook = { version = "0.1.7", optional = true }
serde = { version = "1.0.210", features = ["derive"] }
tsify = { version = "0.5.6", default-features = false, features = ["js"] }
getrandom = { version = "0.2", features = ["js"] }
js-sys = "0.3.98"
serde_bytes = "0.11.19"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.18", default-features = false, features = ["fmt"] }

[profile.release]
opt-level = 3
lto = true
