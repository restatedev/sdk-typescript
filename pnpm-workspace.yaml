packages:
  - packages/libs/*
  - packages/tests/*
  - packages/examples/*

allowBuilds:
  cpu-features: false
  esbuild: false
  heapdump: true
  protobufjs: false
  sharp: false
  ssh2: false
  unrs-resolver: false
  workerd: false

catalog:
  zod: ^4.2.0

# Security overrides: force patched versions of transitive/dev dependencies flagged by
# Dependabot with high/critical severity. Each is pinned within its current major so the
# resolver stays on a compatible line while picking up the fix. Revisit when the packages
# that pull these in (grpc/proto-loader, testcontainers, miniflare, vitest, etc.) ship
# releases whose own ranges already satisfy these minimums.
overrides:
  protobufjs: ^7.6.3
  "@grpc/grpc-js": ^1.14.4
  undici: ^7.28.0
  ws: ^8.21.0
  tmp: ^0.2.6
  fast-uri: ^3.1.2
  vite: ^7.3.5
  vitest: ^3.2.6
  next: ^16.2.6

ignoredBuiltDependencies:
  - cpu-features
  - esbuild
  - protobufjs
  - sharp
  - ssh2
  - unrs-resolver
  - workerd

onlyBuiltDependencies:
  - heapdump

# Disable pnpm's pre-run dependency check. CI runs with it enabled by default, and the
# Release workflow's snapshot step (rewrites lib versions, installs, then `git checkout .`)
# leaves node_modules' dep-state stale, so the next `pnpm run` auto-installs concurrently
# across turbo's parallel tasks and corrupts node_modules/.bin (-> "eslint: Permission
# denied" during release). Pinning it here keeps CI consistent with local dev.
verifyDepsBeforeRun: false
