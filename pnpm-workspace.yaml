packages:
  - packages/libs/*
  - packages/tests/*
  - packages/examples/*

allowBuilds:
  cpu-features: false
  esbuild: false
  heapdump: true
  protobufjs: false
  sharp: false
  ssh2: false
  unrs-resolver: false
  workerd: false

catalog:
  zod: ^4.2.0

ignoredBuiltDependencies:
  - cpu-features
  - esbuild
  - protobufjs
  - sharp
  - ssh2
  - unrs-resolver
  - workerd

onlyBuiltDependencies:
  - heapdump

# Disable pnpm's pre-run dependency check. CI runs with it enabled by default, and the
# Release workflow's snapshot step (rewrites lib versions, installs, then `git checkout .`)
# leaves node_modules' dep-state stale, so the next `pnpm run` auto-installs concurrently
# across turbo's parallel tasks and corrupts node_modules/.bin (-> "eslint: Permission
# denied" during release). Pinning it here keeps CI consistent with local dev.
verifyDepsBeforeRun: false
