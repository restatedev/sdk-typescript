packages:
  - packages/libs/*
  - packages/tests/*
  - packages/examples/*

allowBuilds:
  cpu-features: false
  esbuild: false
  heapdump: true
  protobufjs: false
  sharp: false
  ssh2: false
  unrs-resolver: false
  workerd: false

catalog:
  zod: ^4.2.0

ignoredBuiltDependencies:
  - cpu-features
  - esbuild
  - protobufjs
  - sharp
  - ssh2
  - unrs-resolver
  - workerd

onlyBuiltDependencies:
  - heapdump
