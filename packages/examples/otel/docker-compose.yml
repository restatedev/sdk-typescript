services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  restate:
    image: restatedev/restate:latest
    depends_on:
      - jaeger
    environment:
      - RESTATE_TRACING_ENDPOINT=http://jaeger:4317
    ports:
      - "8080:8080" # Ingress
      - "9070:9070" # Admin
